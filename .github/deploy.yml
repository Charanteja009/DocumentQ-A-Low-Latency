name: CI/CD Pipeline - Build & Deploy RAG Engine

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Lint & Build Docker Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies & Check Syntax
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          python -m py_compile backend/main.py

      - name: Verify Backend Docker Image Build
        run: |
          docker build -t rag-backend:latest ./backend

  deploy:
    name: Deploy to Render Cloud
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Automated Render Deploy Webhook
        run: |
          echo "🚀 Triggering automatic Render deployment..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Deploy signal sent to Render."